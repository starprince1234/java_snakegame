<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <link rel="stylesheet" href="static\css\style.css">
</head>
<body>
<div class="header">
    <h1>🐍 贪吃蛇游戏 🐍</h1>
    <p>经典怀旧游戏 - 挑战你的反应速度</p>
</div>

<div class="game-container">
    <div class="game-info">
        <div class="score-container">
            <div class="score-label">目前最高</div>
            <div class="score-value" id="highScoreDisplay">0</div>
        </div>
        <div class="controls">
            <button id="pauseButton" class="game-button">暂停游戏</button>
        </div>
    </div>

    <div class="game-canvas-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>

        <div class="game-over-overlay" id="gameOverOverlay">
            <div class="game-over-title">游戏结束!</div>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <div class="game-over-image"></div>
            <button id="restartOverlayButton">再玩一次</button>
        </div>
    </div>

    <div class="control-buttons">
        <button id="restartButton" class="game-button">重新开始</button>
    </div>

    <div class="instructions">
        <h3>游戏说明</h3>
        <p>使用键盘方向键 ↑ ↓ ← → 控制蛇的移动方向。吃到红色食物增加得分，撞到墙壁或自己的身体游戏结束。</p>

        <div class="key-instructions">
            <div class="key">↑ 向上</div>
            <div class="key">↓ 向下</div>
            <div class="key">← 向左</div>
            <div class="key">→ 向右</div>
        </div>
    </div>
</div>

<div class="footer">
    &copy; 2023 贪吃蛇游戏 | 使用Java后端 + HTML5前端开发
</div>

<!-- 音频元素 -->
<audio id="bgm" loop>
    <source src="static\audio\bgm.wav" type="audio/mpeg">
</audio>

<!-- 添加音乐控制 -->
<div class="music-controls">
    <button id="musicToggle" class="music-pulse">♪</button>
    <div class="volume-control">
        <span class="volume-icon">🔊</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
    </div>
</div>

<script src="static\js\game.js"></script>
</body>
</html>
